# =============================================================================
# Aushadha — Continuous Deployment
# =============================================================================
# Deploys to GCP Cloud Run after CI passes.
# Triggers on push to main (prod) and staging.
# Requires GitHub secrets:
#   GCP_PROJECT_ID, GCP_SA_KEY (or Workload Identity), GCP_REGION
# =============================================================================

name: Deploy

on:
  push:
    branches: [main, staging]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false # never cancel an in-progress deploy

env:
  GCP_REGION: us-central1
  BACKEND_SERVICE: aushadha-backend
  FRONTEND_SERVICE: aushadha-frontend

jobs:
  # =========================================================================
  # Gate: CI must pass first
  # =========================================================================
  ci:
    uses: ./.github/workflows/ci.yml

  # =========================================================================
  # Deploy Backend to Cloud Run
  # =========================================================================
  deploy-backend:
    name: "🚀 Deploy Backend"
    runs-on: ubuntu-latest
    needs: ci
    permissions:
      contents: read
      id-token: write # for Workload Identity Federation
    steps:
      - uses: actions/checkout@v4

      - name: Determine environment
        id: env
        run: |
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            echo "env_suffix=prod" >> "$GITHUB_OUTPUT"
            echo "service_suffix=" >> "$GITHUB_OUTPUT"
          else
            echo "env_suffix=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
            echo "service_suffix=-${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
          # Alternatively, use Workload Identity:
          # workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          # service_account: ${{ secrets.WIF_SA }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build and push backend image
        run: |
          IMAGE=${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/aushadha/${{ env.BACKEND_SERVICE }}:${{ github.sha }}
          docker build -t $IMAGE ./backend
          docker push $IMAGE

      - name: Deploy backend to Cloud Run
        run: |
          SERVICE_NAME="${{ env.BACKEND_SERVICE }}${{ steps.env.outputs.service_suffix }}"
          IMAGE="${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/aushadha/${{ env.BACKEND_SERVICE }}:${{ github.sha }}"

          gcloud run deploy "$SERVICE_NAME" \
            --image "$IMAGE" \
            --region "${{ env.GCP_REGION }}" \
            --platform managed \
            --port 8000 \
            --memory 2Gi \
            --cpu 2 \
            --timeout 300 \
            --min-instances 0 \
            --max-instances 5 \
            --allow-unauthenticated \
            --set-env-vars "NEO4J_URI=${{ secrets.NEO4J_URI }}" \
            --set-env-vars "NEO4J_USERNAME=${{ secrets.NEO4J_USERNAME }}" \
            --set-env-vars "NEO4J_PASSWORD=${{ secrets.NEO4J_PASSWORD }}" \
            --set-env-vars "NEO4J_DATABASE=${{ secrets.NEO4J_DATABASE }}" \
            --set-env-vars "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" \
            --set-env-vars "DIFFBOT_API_KEY=${{ secrets.DIFFBOT_API_KEY }}" \
            --set-env-vars "TRACK_TOKEN_USAGE=true"

      - name: Print service URL
        run: |
          SERVICE_NAME="${{ env.BACKEND_SERVICE }}${{ steps.env.outputs.service_suffix }}"
          gcloud run services describe "$SERVICE_NAME" \
            --region "${{ env.GCP_REGION }}" \
            --format "value(status.url)"

