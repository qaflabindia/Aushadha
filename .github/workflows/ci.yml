# =============================================================================
# Aushadha — Continuous Integration
# =============================================================================
# Runs on every push & PR to dev / staging / main.
# Jobs: lint-backend, lint-frontend, test-backend, docker-build, security-scan
# NOTE: This is a purely additive file – it does NOT modify any application code.
# =============================================================================

name: CI

on:
  push:
    branches: [main, staging, dev]
  pull_request:
    branches: [main, staging, dev]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# ---------------------------------------------------------------------------
# Shared environment
# ---------------------------------------------------------------------------
env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  # =========================================================================
  # 1. Backend Lint (ruff)
  # =========================================================================
  lint-backend:
    name: "🐍 Lint Backend"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install ruff
        run: pip install ruff

      - name: Ruff check
        run: ruff check backend/ --output-format=github

      - name: Ruff format check
        run: ruff format --check backend/

  # =========================================================================
  # 2. Frontend Lint + Type-check
  # =========================================================================
  lint-frontend:
    name: "⚛️ Lint Frontend"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: yarn
          cache-dependency-path: frontend/yarn.lock

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: ESLint
        run: yarn lint
        # Allow lint warnings for now — fail only on errors
        continue-on-error: true

      - name: TypeScript type-check
        run: npx tsc --noEmit

  # =========================================================================
  # 3. Backend Smoke Tests (pytest)
  # =========================================================================
  test-backend:
    name: "🧪 Test Backend"
    runs-on: ubuntu-latest
    needs: lint-backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libmagic1 poppler-utils tesseract-ocr

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r backend/requirements.txt || true
          pip install pytest httpx

      - name: Run smoke tests
        run: python -m pytest backend/tests/ -v --tb=short -x
        env:
          # Provide dummy env vars so the app can import without crashing
          NEO4J_URI: "bolt://localhost:7687"
          NEO4J_USERNAME: "neo4j"
          NEO4J_PASSWORD: "test"
          NEO4J_DATABASE: "neo4j"
          OPENAI_API_KEY: "sk-test-dummy"
          POSTGRES_HOST: "localhost"
          POSTGRES_PORT: "5432"
          POSTGRES_DB: "testdb"
          POSTGRES_USER: "testuser"
          POSTGRES_PASSWORD: "testpass"

  # =========================================================================
  # 4. Docker Build Validation
  # =========================================================================
  docker-build:
    name: "🐳 Docker Build"
    runs-on: ubuntu-latest
    needs: [lint-backend, lint-frontend]
    strategy:
      matrix:
        include:
          - context: ./backend
            dockerfile: ./backend/Dockerfile
            image-name: backend
          - context: ./frontend
            dockerfile: ./frontend/Dockerfile
            image-name: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.image-name }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: false
          tags: aushadha/${{ matrix.image-name }}:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # =========================================================================
  # 5. Security Scan
  # =========================================================================
  security-scan:
    name: "🔒 Security Scan"
    runs-on: ubuntu-latest
    needs: lint-backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: pip-audit (Python dependency vulnerabilities)
        run: |
          pip install pip-audit
          pip-audit -r backend/requirements.txt --desc || true

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: "."
          severity: "HIGH,CRITICAL"
          exit-code: 0 # warn but don't block — tighten later
          format: table
