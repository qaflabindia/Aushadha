services:
  neo4j:
    image: neo4j:5.23.0
    container_name: neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=${NEO4J_USERNAME}/${NEO4J_PASSWORD}
      - NEO4J_PLUGINS=["apoc", "bloom", "graph-data-science"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*,gds.*,bloom.*
      - NEO4J_server_memory_heap_initial__size=512m
      - NEO4J_server_memory_heap_max__size=512m
      - NEO4J_server_memory_pagecache_size=512m
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    networks:
      - net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend
    command: uvicorn score:app --host 0.0.0.0 --port 8000 --reload
    env_file:
      - ./backend/.env
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USERNAME=${NEO4J_USERNAME:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}
      - NEO4J_DATABASE=${NEO4J_DATABASE:-neo4j}
      - KNN_MIN_SCORE=${KNN_MIN_SCORE-0.94}
      - IS_EMBEDDING=${IS_EMBEDDING-true}
      - GOOGLE_APPLICATION_CREDENTIALS=/root/.config/gcloud/application_default_credentials.json
    extra_hosts:
      - host.docker.internal:host-gateway
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/code
      - ${HOME}/.config/gcloud:/root/.config/gcloud:ro
    depends_on:
      - neo4j
    networks:
      - net

  frontend:
    image: node:20
    container_name: frontend
    working_dir: /app
    # Run yarn install before starting the dev server to ensure node_modules are present
    command: sh -c "yarn install && yarn run dev --host 0.0.0.0"
    volumes:
      - ./frontend:/app
    environment:
      - VITE_BACKEND_API_URL=http://localhost:8000
    env_file:
      - ./frontend/.env
    ports:
      - "8080:5173"
    depends_on:
      - backend
    networks:
      - net

  local-llm:
    build:
      context: ./local-llm/docker
      dockerfile: Dockerfile
    container_name: local-llm
    volumes:
      - ./local-llm/models:/models:ro
    ports:
      - "8091:8080"
    networks:
      - net

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-aushadha}
      - POSTGRES_USER=${POSTGRES_USER:-aushadha_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - net

  # indic-llm:
  #   build:
  #     context: ./local-llm/api
  #     dockerfile: ../docker/Dockerfile.indic
  #   container_name: indic-llm
  #   volumes:
  #     - ./data/models/sarvam-2b:/models/sarvam-2b:ro
  #   ports:
  #     - "8092:8000"
  #   networks:
  #     - net

  local-llm-proxy:
    image: python:3.11-slim
    container_name: local-llm-proxy
    working_dir: /app
    volumes:
      - ./local-llm/api:/app
    command: sh -c "pip install fastapi httpx uvicorn && uvicorn proxy:app --host 0.0.0.0 --port 8090"
    environment:
      - LLM_URL=http://local-llm:8080/v1
    ports:
      - "8090:8090"
    depends_on:
      - local-llm
    networks:
      - net

networks:
  net:
    driver: bridge

volumes:
  neo4j_data:
  neo4j_logs:
  postgres_data:
